<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Specimen — Species Recognition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F2EEE4;
    --paper-dim: #E8E2D2;
    --ink: #1F2318;
    --moss: #4A5D3A;
    --moss-deep: #2E3B22;
    --rust: #B5582E;
    --line: #C9C2AC;
    --card: #FBF9F3;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(31,35,24,0.035) 1px, transparent 0);
    background-size: 22px 22px;
    z-index: 0;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 36px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--moss);
    margin: 0 0 6px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    margin: 0;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .field-no {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    opacity: 0.55;
    text-align: right;
  }

  .panel {
    background: var(--card);
    border: 1.5px solid var(--ink);
    box-shadow: 4px 4px 0 var(--line);
  }

  .dropzone {
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s ease;
    border-bottom: 1.5px solid var(--ink);
  }
  .dropzone:hover { background: var(--paper-dim); }
  .dropzone.drag { background: #E3E9D8; }

  .dropzone svg { opacity: 0.55; margin-bottom: 10px; }

  .dz-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    margin: 0 0 4px;
  }
  .dz-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.5;
    margin: 0;
  }

  #fileInput { display: none; }

  .preview-row {
    display: none;
    padding: 20px;
    gap: 18px;
    align-items: center;
    border-bottom: 1.5px solid var(--ink);
  }
  .preview-row.show { display: flex; }

  #previewImg {
    width: 84px;
    height: 84px;
    object-fit: cover;
    border: 1.5px solid var(--ink);
    flex-shrink: 0;
  }

  .preview-meta { flex: 1; min-width: 0; }
  .preview-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .preview-clear {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--rust);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 4px;
    text-decoration: underline;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    flex-wrap: wrap;
  }

  .model-select {
    display: flex;
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .model-select button {
    background: var(--card);
    border: none;
    padding: 9px 14px;
    cursor: pointer;
    color: var(--ink);
    opacity: 0.5;
  }
  .model-select button.active {
    background: var(--moss-deep);
    color: var(--paper);
    opacity: 1;
  }
  .model-select button:first-child { border-right: 1.5px solid var(--ink); }

  .predict-btn {
    margin-left: auto;
    background: var(--rust);
    color: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 11px 22px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .predict-btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--ink); }
  .predict-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .result {
    display: none;
    border-top: 1.5px solid var(--ink);
    padding: 24px 20px;
  }
  .result.show { display: block; }

  .result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--moss);
    margin: 0 0 8px;
  }

  .species-name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    margin: 0 0 14px;
    text-transform: capitalize;
  }

  .confidence-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .confidence-bar {
    flex: 1;
    height: 8px;
    background: var(--paper-dim);
    border: 1px solid var(--ink);
    position: relative;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    background: var(--moss);
    width: 0%;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .confidence-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    min-width: 48px;
    text-align: right;
  }

  .model-tag {
    display: inline-block;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.45;
    border: 1px solid var(--line);
    padding: 3px 8px;
  }

  .loading {
    display: none;
    padding: 30px 20px;
    text-align: center;
    border-top: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--moss);
  }
  .loading.show { display: block; }
  .loading::before {
    content: "";
    display: block;
    width: 16px;
    height: 16px;
    margin: 0 auto 10px;
    border: 2px solid var(--line);
    border-top-color: var(--moss);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    display: none;
    border-top: 1.5px solid var(--rust);
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--rust);
    background: #FBEFE8;
  }
  .error.show { display: block; }

  .history-toggle {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-toggle button {
    background: none;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  table.history {
    width: 100%;
    border-collapse: collapse;
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    display: none;
  }
  table.history.show { display: table; }
  table.history th, table.history td {
    text-align: left;
    padding: 7px 8px;
    border-bottom: 1px solid var(--line);
  }
  table.history th {
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    color: var(--moss);
    border-bottom: 1.5px solid var(--ink);
  }
  table.history td.species { text-transform: capitalize; font-style: italic; }

  footer {
    margin-top: 50px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink);
    opacity: 0.4;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div>
      <p class="eyebrow">Field Identification Tool</p>
      <h1>Specimen</h1>
    </div>
    <div class="field-no" id="fieldNo">No. 001</div>
  </header>

  <div class="panel">

    <div class="dropzone" id="dropzone">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="dz-title">Drop a photograph, or click to browse</p>
      <p class="dz-sub">JPG · JPEG · PNG</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/jpg,image/png" />
    </div>

    <div class="preview-row" id="previewRow">
      <img id="previewImg" alt="preview" />
      <div class="preview-meta">
        <div class="preview-name" id="previewName"></div>
        <button class="preview-clear" id="clearBtn">remove</button>
      </div>
    </div>

    <div class="controls">
      <div class="model-select">
        <button class="active" data-model="ResNet50">ResNet50</button>
        <button data-model="VGG16">VGG16</button>
      </div>
      <button class="predict-btn" id="predictBtn" disabled>Identify</button>
    </div>

    <div class="loading" id="loading">consulting the model…</div>

    <div class="error" id="errorBox"></div>

    <div class="result" id="result">
      <p class="result-label">Best match</p>
      <p class="species-name" id="speciesName">—</p>
      <div class="confidence-row">
        <div class="confidence-bar"><div class="confidence-fill" id="confFill"></div></div>
        <div class="confidence-pct" id="confPct">0%</div>
      </div>
      <span class="model-tag" id="modelTag">ResNet50</span>
    </div>

  </div>

  <div class="history-toggle">
    <p class="eyebrow" style="margin:0;">Log</p>
    <button id="historyBtn">show previous results</button>
  </div>
  <table class="history" id="historyTable">
    <thead>
      <tr><th>Date</th><th>Time</th><th>Species</th><th>Conf.</th><th>Model</th></tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>

  <footer>
    <span>pretrained on ImageNet</span>
    <span id="apiStatus">checking backend…</span>
  </footer>

</div>

<script>
  const API_BASE = "http://localhost:5000/api";

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewRow = document.getElementById('previewRow');
  const previewImg = document.getElementById('previewImg');
  const previewName = document.getElementById('previewName');
  const clearBtn = document.getElementById('clearBtn');
  const predictBtn = document.getElementById('predictBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const errorBox = document.getElementById('errorBox');
  const speciesName = document.getElementById('speciesName');
  const confFill = document.getElementById('confFill');
  const confPct = document.getElementById('confPct');
  const modelTag = document.getElementById('modelTag');
  const modelButtons = document.querySelectorAll('.model-select button');
  const historyBtn = document.getElementById('historyBtn');
  const historyTable = document.getElementById('historyTable');
  const historyBody = document.getElementById('historyBody');
  const fieldNo = document.getElementById('fieldNo');
  const apiStatus = document.getElementById('apiStatus');

  let selectedFile = null;
  let selectedModel = "ResNet50";
  let predictionCount = 0;

  // --- backend health check ---
  fetch(`${API_BASE}/health`).then(r => r.ok ? apiStatus.textContent = "backend connected" : Promise.reject())
    .catch(() => apiStatus.textContent = "backend unreachable — start app.py on :5000");

  // --- model toggle ---
  modelButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      modelButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedModel = btn.dataset.model;
    });
  });

  // --- file selection ---
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  ['dragover', 'dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, e => e.preventDefault());
  });
  dropzone.addEventListener('dragover', () => dropzone.classList.add('drag'));
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    dropzone.classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file) return;
    if (!['image/jpeg', 'image/jpg', 'image/png'].includes(file.type)) {
      showError("Please choose a JPG or PNG image.");
      return;
    }
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewName.textContent = file.name;
    previewRow.classList.add('show');
    predictBtn.disabled = false;
    result.classList.remove('show');
    errorBox.classList.remove('show');
  }

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    previewRow.classList.remove('show');
    predictBtn.disabled = true;
    result.classList.remove('show');
  });

  // --- predict ---
  predictBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    loading.classList.add('show');
    result.classList.remove('show');
    errorBox.classList.remove('show');
    predictBtn.disabled = true;

    const formData = new FormData();
    formData.append('image', selectedFile);
    formData.append('model', selectedModel);

    try {
      const res = await fetch(`${API_BASE}/predict`, { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Prediction failed.');

      predictionCount++;
      fieldNo.textContent = `No. ${String(predictionCount).padStart(3, '0')}`;

      speciesName.textContent = data.species;
      const pct = Math.round(data.accuracy * 100);
      confPct.textContent = `${pct}%`;
      modelTag.textContent = data.model;
      result.classList.add('show');
      requestAnimationFrame(() => { confFill.style.width = `${pct}%`; });

    } catch (err) {
      showError(err.message || "Could not reach the backend. Is app.py running on port 5000?");
    } finally {
      loading.classList.remove('show');
      predictBtn.disabled = false;
    }
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }

  // --- history ---
  let historyShown = false;
  historyBtn.addEventListener('click', async () => {
    if (historyShown) {
      historyTable.classList.remove('show');
      historyBtn.textContent = "show previous results";
      historyShown = false;
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/history`);
      const data = await res.json();
      historyBody.innerHTML = '';
      data.results.slice(0, 20).forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.Date}</td><td>${r.Time}</td><td class="species">${r.Species}</td><td>${Math.round(parseFloat(r.Accuracy)*100)}%</td><td>${r.Model || ''}</td>`;
        historyBody.appendChild(tr);
      });
      historyTable.classList.add('show');
      historyBtn.textContent = "hide";
      historyShown = true;
    } catch {
      showError("Could not load history.");
    }
  });
</script>

</body>
</html>
